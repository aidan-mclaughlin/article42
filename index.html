function loadProgress() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultProgress();
    const p = JSON.parse(raw);
    return Object.assign(defaultProgress(), p);
  } catch (e) {
    return defaultProgress();
  }
}
function defaultProgress() {
  return { stickers: {}, streak: 0, lastStreakDate: null, totalScore: 0 };
}
function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(progress)); } catch (e) {}
}
function todayISO() {
  const d = new Date();
  const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}
function daysBetween(aISO, bISO) {
  if (!aISO || !bISO) return Infinity;
  const a = new Date(aISO + "T00:00:00"), b = new Date(bISO + "T00:00:00");
  return Math.round((b - a) / 86400000);
}
function grantSticker(id) {
  if (progress.stickers[id]) return false;
  progress.stickers[id] = new Date().toISOString();
  saveProgress();
  return true;
}
function stickerCount() { return Object.keys(progress.stickers).length; }
function bumpScore(n) {
  state.score += n;
  progress.totalScore += n;
  saveProgress();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}

function setView(v, badgeText) {
  state.view = v;
  state.ageBadge = badgeText || null;
  const homeBtn = document.getElementById('home-btn');
  const ageBadge = document.getElementById('age-badge');
  if (v === 'home') {
    homeBtn.classList.add('hidden');
    homeBtn.classList.remove('flex');
    ageBadge.classList.add('hidden');
  } else {
    homeBtn.classList.remove('hidden');
    homeBtn.classList.add('flex');
    if (badgeText) {
      ageBadge.textContent = badgeText;
      ageBadge.classList.remove('hidden');
    } else {
      ageBadge.classList.add('hidden');
    }
  }
  window.scrollTo({ top: 0, behavior: 'instant' });
  render();
}

function goHome() {
  // Reset all local view state (progress in localStorage is preserved)
  state.score = 0;
  state.board = { position: 0, dice: null, rolling: false, tileAction: null, finished: false, selectedAnswer: null, skipNext: false };
  state.kidsScenario = { current: 0, selected: null, done: false };
  state.kidsRightsIndex = 0;
  state.teensRightsIndex = 0;
  state.teensScenario = { index: 0, selected: null, reflections: [] };
  state.quiz = { index: 0, answered: false, selected: null, correctCount: 0 };
  state.askTopicId = null;
  state.detective = { caseIdx: 0, picks: [], revealed: false, done: false };
  state.memory = { cards: [], flipped: [], matched: [], moves: 0, started: false, won: false, lockUntil: 0 };
  state.daily = { revealed: false, picked: null };
  setView('home');
}

function tileColor(tile) {
  if (tile.type === "start") return "bg-stone-900 text-amber-50";
  if (tile.type === "finish") return "bg-yellow-300 text-stone-900";
  if (tile.type === "right") return "bg-rose-200 text-stone-900";
  if (tile.type === "question") return "bg-sky-200 text-stone-900";
  if (tile.type === "scenario") return "bg-emerald-200 text-stone-900";
  if (tile.type === "bonus") return "bg-yellow-200 text-stone-900";
  if (tile.type === "skip") return "bg-stone-300 text-stone-900";
  return "bg-amber-100 text-stone-900";
}
function tileLabel(tile) {
  if (tile.type === "start") return "START";
  if (tile.type === "finish") return "FINISH";
  if (tile.type === "right") return "RIGHT";
  if (tile.type === "question") return "QUIZ";
  if (tile.type === "scenario") return "CHOICE";
  if (tile.type === "bonus") return "BONUS";
  if (tile.type === "skip") return "PAUSE";
  return "";
}

        </div>

  `;
}

function rollDice() {
  const b = state.board;
  if (b.rolling || b.tileAction || b.finished) return;
  if (b.skipNext) {
    b.skipNext = false;
    b.tileAction = { kind: 'info', text: 'You skipped a turn to think it through. Smart move!' };
    render();
    return;
  }
  b.rolling = true;
  render();
  let count = 0;
  const interval = setInterval(() => {
    b.dice = Math.floor(Math.random() * 6) + 1;
    count++;
    const diceBox = document.getElementById('dice-box');
    if (diceBox) diceBox.textContent = b.dice;
    if (count > 8) {
      clearInterval(interval);
      const finalRoll = Math.floor(Math.random() * 6) + 1;
      b.dice = finalRoll;
      b.rolling = false;
      const target = Math.min(b.position + finalRoll, boardTiles.length - 1);
      b.position = target;
      render();
      setTimeout(() => { handleTile(target); render(); }, 400);
    }
  }, 80);
}

function handleTile(idx) {
  const b = state.board;
  const tile = boardTiles[idx];
  if (tile.type === 'finish') { b.finished = true; grantSticker('board-finished'); return; }
  if (tile.type === 'right') b.tileAction = { kind: 'right', ...tile };
  else if (tile.type === 'question') b.tileAction = { kind: 'question', ...tile };
  else if (tile.type === 'scenario') b.tileAction = { kind: 'scenario', ...tile };
  else if (tile.type === 'bonus') { bumpScore(5); b.tileAction = { kind: 'info', text: tile.text }; }
  else if (tile.type === 'skip') { b.skipNext = true; b.tileAction = { kind: 'info', text: tile.text }; }
}

function submitBoardAnswer(idx) {
  const b = state.board;
  b.selectedAnswer = idx;
  if (idx === b.tileAction.correct) bumpScore(10);
  else { state.score = Math.max(0, state.score - 2); progress.totalScore = Math.max(0, progress.totalScore - 2); saveProgress(); }
  render();
}

function acknowledgeRight() { bumpScore(3); closeTileAction(); }

function closeTileAction() {
  const b = state.board;
  b.tileAction = null;
  b.selectedAnswer = null;
  if (b.position === boardTiles.length - 1) { b.finished = true; grantSticker('board-finished'); }
  render();
}

function resetBoard() {
  state.board = { position: 0, dice: null, rolling: false, tileAction: null, finished: false, selectedAnswer: null, skipNext: false };
  render();
}

function buildMemoryDeck() {
  // Build pairs of cards: one "icon" card and one "name" card per right.
  const deck = [];
  memoryPairs.forEach((p, i) => {
    deck.push({ pairId: i, kind: 'icon', text: p.icon, num: p.num });
    deck.push({ pairId: i, kind: 'name', text: p.name, num: p.num });
  });
  // Shuffle (Fisher–Yates)
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  return deck;
}

function renderKidsMemory() {
  const m = state.memory;
  if (!m.started) {
    m.cards = buildMemoryDeck();
    m.flipped = [];
    m.matched = [];

  const cardsHtml = m.cards.map((card, idx) => {

    const front = isFlipped

    const bg = isMatched

    return `

  const winBanner = m.won ? `

      <div class="mt-4 flex flex-wrap items-center justify-center gap-3">
        <button onclick="restartMemory()" class="bg-stone-900 text-amber-50 font-bold px-6 py-3 rounded-lg hover:bg-rose-600">Play again</button>

      </div>
    </div>` : '';

  return `
    <div class="max-w-3xl mx-auto px-4 sm:px-6 py-8 fade-in">
      <div class="mb-6 flex items-center justify-between flex-wrap gap-3">
        <div>
          <div class="text-xs font-bold text-stone-600 tracking-widest">RIGHTS QUEST · GAME 5</div>
          <h2 class="font-black text-3xl sm:text-4xl text-stone-900">Memory Match</h2>
          <p class="text-stone-700 mt-1">Match the article icon with its name. Best in 16 moves or fewer.</p>
        </div>
        <div class="flex items-center gap-2">
          <div class="bg-stone-900 text-amber-50 px-3 py-2 rounded-lg text-sm font-bold">${m.moves} moves</div>
          <button onclick="restartMemory()" class="bg-amber-50 border-2 border-stone-900 px-3 py-2 rounded-lg text-sm font-bold hover:bg-stone-900 hover:text-amber-50">↻ Reset</button>
        </div>

        <div class="grid grid-cols-4 gap-2 sm:gap-3">${cardsHtml}</div>
      </div>
    </div>
  `;
}

function flipMemoryCard(idx) {
  const m = state.memory;
  if (Date.now() < m.lockUntil) return;
  if (m.matched.includes(idx) || m.flipped.includes(idx)) return;
  if (m.flipped.length >= 2) return;

  m.flipped.push(idx);

  if (m.flipped.length === 2) {
    m.moves++;
    const [a, b] = m.flipped;
    if (m.cards[a].pairId === m.cards[b].pairId) {
      // Match!
      m.matched.push(a, b);
      m.flipped = [];
      bumpScore(2);
      if (m.matched.length === m.cards.length) {
        m.won = true;
        grantSticker('memory-played');
        if (m.moves <= 16) grantSticker('memory-perfect');
      }
    } else {
      // Brief lock so kid sees both cards before they flip back
      m.lockUntil = Date.now() + 900;
      setTimeout(() => { m.flipped = []; render(); }, 900);
    }
  }
  render();
}

function restartMemory() {
  state.memory = { cards: [], flipped: [], matched: [], moves: 0, started: false, won: false, lockUntil: 0 };
  render();
}

function dailyIndexForDate(iso) {

  const n = parseInt(iso.replace(/-/g, ''), 10);

function submitDaily(i) {
  const d = state.daily;
  if (d.revealed) return;
  d.picked = i;
  d.revealed = true;

  const today = todayISO();
  const q = dailyQuestions[dailyIndexForDate(today)];

  // First time today? Update streak + grant daily sticker, regardless of right/wrong
  // (the goal is showing up; the explanation does the teaching).
  const stickerId = 'daily-' + today;
  if (!progress.stickers[stickerId]) {
    grantSticker(stickerId);

    const last = progress.lastStreakDate;
    const gap = daysBetween(last, today);
    if (gap === 1) progress.streak += 1;
    else if (gap === 0) { /* same day, leave streak alone */ }
    else progress.streak = 1;
    progress.lastStreakDate = today;

    // Streak milestones
    if (progress.streak >= 3) grantSticker('daily-streak-3');
    if (progress.streak >= 7) grantSticker('daily-streak-7');
    if (progress.streak >= 30) grantSticker('daily-streak-30');

    saveProgress();
  }

  if (i === q.correct) bumpScore(5);
  render();
}

      </div>

      <div class="chip bg-sky-200 mb-5">${escapeHtml(question.short)}</div>
      <h2 class="font-black text-2xl sm:text-3xl text-stone-900 mb-7 leading-tight">${escapeHtml(question.q)}</h2>

      <div class="space-y-2 mb-5">
        ${question.options.map((opt, i) => {
          const isSelected = q.selected === i;
          let bg = 'bg-amber-50 hover:bg-yellow-200';
          if (show) {
            if (opt.correct) bg = 'bg-emerald-200';
            else if (isSelected) bg = 'bg-rose-200';
            else bg = 'bg-amber-50 opacity-40';
          }
          return `
            <button onclick="${show ? '' : `answerQuiz(${i})`}" ${show ? 'disabled' : ''} class="${bg} w-full text-left p-4 rounded-lg border-2 border-stone-900 font-bold transition-all">
              <div class="flex items-start gap-3">
                <div class="text-xs font-black text-stone-500 mt-1 flex-shrink-0">${String.fromCharCode(65 + i)}</div>
                <div class="text-sm sm:text-base flex-1">${escapeHtml(opt.label)}</div>
                ${show && opt.correct ? '<div class="text-emerald-700 font-black">✓</div>' : ''}
              </div>
            </button>
          `;
        }).join('')}
      </div>

      ${show ? `
        <div class="fade-in bg-stone-900 text-amber-50 rounded-2xl p-6 mb-5">
          <div class="text-[10px] font-black tracking-widest text-yellow-300 mb-2">CONTEXT</div>
          <p class="leading-relaxed text-sm">${escapeHtml(question.explanation)}</p>
        </div>
        <div class="flex justify-end">
          <button onclick="nextQuiz()" class="bg-stone-900 text-amber-50 px-5 py-3 rounded-lg text-sm font-bold hover:bg-rose-600">
            ${q.index === legalQuiz.length - 1 ? 'See result' : 'Next question'} →
          </button>
        </div>
      ` : ''}
    </div>
  `;
}

function answerQuiz(i) {
  const q = state.quiz;
  if (q.answered) return;
  q.answered = true; q.selected = i;
  if (legalQuiz[q.index].options[i].correct) q.correctCount++;
  render();
}
function nextQuiz() { state.quiz.index++; state.quiz.answered = false; state.quiz.selected = null; render(); }
function restartQuiz() { state.quiz = { index: 0, answered: false, selected: null, correctCount: 0 }; render(); }

// ============================================================================
// ASK ARTICLE 42
// ============================================================================

function renderAskHome() {
  const rotates = ['-rotate-1', 'rotate-1', '-rotate-[0.5deg]', 'rotate-[0.5deg]'];
  const cards = askTopics.map((t, i) => `
    <button onclick="openAskTopic('${t.id}')" class="${t.color} ${rotates[i % rotates.length]} hover:rotate-0 hover:scale-[1.02] transition-all duration-200 p-5 sm:p-6 rounded-2xl border-4 border-stone-900 text-left shadow-hard-md hover:shadow-hard hover:-translate-y-1">
      <div class="flex items-start justify-between mb-4">
        <div class="text-3xl">${t.icon}</div>
        <div class="text-stone-900 font-black text-sm">→</div>
      </div>
      <h3 class="font-black text-base sm:text-lg text-stone-900 mb-2 leading-tight">${escapeHtml(t.title)}</h3>
      <p class="text-stone-700 text-xs sm:text-sm leading-relaxed">${escapeHtml(t.blurb)}</p>
    </button>
  `).join('');

  return `
    <div class="max-w-5xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
      <div class="mb-10 max-w-3xl">
        <div class="text-xs font-black text-stone-600 tracking-widest">ANY AGE</div>
        <h2 class="font-black text-4xl sm:text-6xl text-stone-900 leading-[0.95] tracking-tight mt-2 mb-5">
          What's on<br><span class="italic bg-yellow-300 px-3 inline-block transform -rotate-1">your mind?</span>
        </h2>
        <p class="text-stone-700 text-lg leading-relaxed">Pick a worry. We'll show you which rights are in the room, concrete things you can do, and real places you can go for help in Scotland.</p>
      </div>
      <div class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-5 mb-12">${cards}</div>
      <div class="bg-stone-900 text-amber-50 rounded-2xl p-6 sm:p-7">
        <div class="flex items-start gap-4">
          <div class="flex-shrink-0 w-12 h-12 bg-yellow-300 text-stone-900 rounded-full flex items-center justify-center text-xl font-black">!</div>
          <div>
            <h4 class="font-black text-lg mb-1">If you are in immediate danger</h4>
            <p class="text-stone-300 text-sm leading-relaxed">Call <span class="font-black text-yellow-300">999</span>. For 24/7 confidential support under 19, call Childline on <span class="font-black text-yellow-300">0800 1111</span>. For mental-health support any time, text <span class="font-black text-yellow-300">SHOUT to 85258</span>.</p>
          </div>
        </div>
      </div>
    </div>
  `;
}

function openAskTopic(id) { state.askTopicId = id; setView('ask-topic', state.ageBadge); }

function renderAskTopic() {
  const topic = askTopics.find(t => t.id === state.askTopicId);
  if (!topic) { state.view = 'ask-home'; return renderAskHome(); }

  return `
    <div class="max-w-3xl mx-auto px-4 sm:px-6 py-8 fade-in">
      <button onclick="setView('ask-home', state.ageBadge)" class="mb-5 text-sm font-bold text-stone-600 hover:text-stone-900">← Back to all worries</button>

      <div class="${topic.color} border-4 border-stone-900 rounded-2xl p-7 sm:p-10 shadow-hard mb-6 transform -rotate-[0.3deg]">
        <div class="text-5xl mb-4">${topic.icon}</div>
        <h2 class="font-black text-2xl sm:text-4xl text-stone-900 leading-tight mb-3">${escapeHtml(topic.title)}</h2>
        <p class="text-stone-800 text-base sm:text-lg leading-relaxed">${escapeHtml(topic.blurb)}</p>
      </div>

      <div class="bg-amber-50 border-4 border-stone-900 rounded-2xl p-6 sm:p-8 shadow-hard-md mb-6">
        <div class="text-xs font-black tracking-widest text-rose-700 mb-4">YOUR RIGHTS HERE</div>
        <div class="space-y-4">
          ${topic.articles.map(a => `
            <div class="flex gap-4">
              <div class="flex-shrink-0 w-12 h-12 bg-stone-900 text-amber-50 rounded-xl flex items-center justify-center font-black text-sm">${a.num}</div>
              <div>
                <div class="font-black text-stone-900 mb-1">Article ${a.num}, ${escapeHtml(a.title)}</div>
                <p class="text-stone-700 text-sm leading-relaxed">${escapeHtml(a.text)}</p>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="bg-amber-50 border-4 border-stone-900 rounded-2xl p-6 sm:p-8 shadow-hard-md mb-6">
        <div class="text-xs font-black tracking-widest text-rose-700 mb-4">WHAT YOU CAN DO</div>
        <ul class="space-y-3">
          ${topic.actions.map((a, i) => `
            <li class="flex gap-3">
              <div class="flex-shrink-0 w-7 h-7 bg-yellow-300 text-stone-900 rounded-full flex items-center justify-center font-black text-xs border-2 border-stone-900 mt-0.5">${i + 1}</div>
              <p class="text-stone-800 leading-relaxed text-sm sm:text-base">${escapeHtml(a)}</p>
            </li>
          `).join('')}
        </ul>
      </div>

      <div class="bg-stone-900 text-amber-50 rounded-2xl p-6 sm:p-8 shadow-hard">
        <div class="text-xs font-black tracking-widest text-yellow-300 mb-4">WHERE TO TURN</div>
        <div class="space-y-3">
          ${topic.resources.map(r => `
            <div class="flex items-start justify-between gap-3 pb-3 border-b border-stone-700 last:border-0 last:pb-0">
              <div class="flex-1">
                <div class="font-black text-amber-50 text-base">${escapeHtml(r.name)}</div>
                <div class="text-stone-400 text-sm mt-0.5">${escapeHtml(r.detail)}</div>
              </div>
              ${r.url ? `<a href="${escapeHtml(r.url)}" target="_blank" rel="noopener noreferrer" class="flex-shrink-0 bg-yellow-300 text-stone-900 text-xs font-black px-3 py-2 rounded-lg hover:bg-yellow-400">Visit →</a>` : ''}
            </div>
          `).join('')}
        </div>
      </div>

      <div class="mt-8 text-center text-sm text-stone-600">
        <p>This page is a starting point, not a diagnosis or legal advice. For serious situations, talking to a real person, helpline, GP, trusted adult, beats reading a website.</p>
      </div>
    </div>
  `;
}

// ============================================================================
// RENDER
// ============================================================================

function render() {
  const root = document.getElementById('app-root');
  if (state.view === 'home') root.innerHTML = renderHome();
  else if (state.view === 'kids-home') root.innerHTML = renderKidsHome();
  else if (state.view === 'kids-board') root.innerHTML = renderBoardGame();
  else if (state.view === 'kids-scenarios') root.innerHTML = renderKidsScenarios();
  else if (state.view === 'kids-library') root.innerHTML = renderKidsLibrary();
  else if (state.view === 'kids-detective') root.innerHTML = renderKidsDetective();
  else if (state.view === 'kids-memory') root.innerHTML = renderKidsMemory();
  else if (state.view === 'kids-daily') root.innerHTML = renderKidsDaily();
  else if (state.view === 'kids-album') root.innerHTML = renderKidsAlbum();
  else if (state.view === 'teens-home') root.innerHTML = renderTeensHome();
  else if (state.view === 'teens-rights') root.innerHTML = renderTeensRights();
  else if (state.view === 'teens-scenarios') root.innerHTML = renderTeensScenarios();
  else if (state.view === 'teens-quiz') root.innerHTML = renderLegalQuiz();
  else if (state.view === 'ask-home') root.innerHTML = renderAskHome();
  else if (state.view === 'ask-topic') root.innerHTML = renderAskTopic();
  else root.innerHTML = renderHome();
}

render();
</script>
</body>
</html>
